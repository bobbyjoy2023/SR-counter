plugins {
    id 'com.android.application'
}

android {
    namespace 'com.bobby.ironstreak'
    compileSdk 34

    defaultConfig {
        applicationId "com.bobby.ironstreak"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
